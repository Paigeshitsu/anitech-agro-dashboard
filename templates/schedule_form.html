{% extends 'base.html' %}

{% block page_title %}{{ action }} Schedule{% endblock %}

{% block extra_css %}
<style>
    .form-card {
        background: white;
        border-radius: var(--at-radius-md);
        box-shadow: var(--at-shadow-sm);
        padding: 30px;
        max-width: 600px;
        margin: 0 auto;
    }
    
    .form-card h2 {
        color: var(--at-primary);
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 2px solid var(--at-bg-light);
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        font-weight: 500;
        color: var(--at-text-dark);
        margin-bottom: 8px;
    }
    
    .form-control, .form-select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: var(--at-radius-sm);
        font-size: 14px;
        transition: var(--at-transition);
    }
    
    .form-control:focus, .form-select:focus {
        border-color: var(--at-primary);
        box-shadow: 0 0 0 3px rgba(26, 71, 42, 0.1);
        outline: none;
    }
    
    textarea.form-control {
        resize: vertical;
        min-height: 100px;
    }
    
    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 25px;
    }
    
    .btn-submit {
        background: var(--at-primary);
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: var(--at-radius-sm);
        font-weight: 500;
        cursor: pointer;
        transition: var(--at-transition);
    }
    
    .btn-submit:hover {
        background: var(--at-primary-dark);
        transform: translateY(-1px);
    }
    
    .btn-cancel {
        background: #6c757d;
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: var(--at-radius-sm);
        font-weight: 500;
        text-decoration: none;
        transition: var(--at-transition);
    }
    
    .btn-cancel:hover {
        background: #5a6268;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-card">
    <h2><i class="bi bi-calendar-plus"></i> {{ action }} Schedule</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_title">Title</label>
            <input type="text" name="title" id="id_title" class="form-control" 
                   placeholder="e.g., Rice Distribution" value="{{ form.title.value|default:'' }}" required>
        </div>
        
        <div class="form-group">
            <label for="id_description">Description</label>
            <textarea name="description" id="id_description" class="form-control" 
                      placeholder="Description of the schedule" rows="3">{{ form.description.value|default:'' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="id_scheduled_date">Scheduled Date & Time</label>
            <input type="datetime-local" name="scheduled_date" id="id_scheduled_date" 
                   class="form-control" value="{{ form.scheduled_date.value|default:'' }}" required>
        </div>
        
        <div class="form-group">
            <label for="id_location">Location</label>
            <input type="text" name="location" id="id_location" class="form-control" 
                   placeholder="e.g., Distribution Center A" value="{{ form.location.value|default:'' }}" required>
        </div>
        
        <div class="form-group">
            <label for="id_status">Status</label>
            <select name="status" id="id_status" class="form-select">
                <option value="Pending" {% if form.status.value == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if form.status.value == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if form.status.value == 'Completed' %}selected{% endif %}>Completed</option>
                <option value="Cancelled" {% if form.status.value == 'Cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn-submit">
                <i class="bi bi-check-circle"></i> {{ action }} Schedule
            </button>
            <a href="{% url 'schedule' %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
