{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <a href="{% url 'home' %}"><div class="close">✖</div></a>
    <img src="/static/logo.png" alt="ANITECH Logo">
    <h2>ANITECH</h2>
    <p>Create an account to access your dashboard</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Create account</button>
    </form>

    <div class="terms">
      By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>
  </div>
</div>
{% endblock %}
