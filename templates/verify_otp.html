{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
    <title>Verify OTP - ANITECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        :root {
            --at-primary: #1a472a;
            --at-primary-dark: #143620;
            --at-primary-light: #2d5a3f;
            --at-secondary: #4f7f5a;
            --at-accent: #4ade80;
            --at-shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
            --at-radius-lg: 15px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--at-primary) 0%, var(--at-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .otp-card {
            background: white;
            border-radius: var(--at-radius-lg);
            box-shadow: var(--at-shadow-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .otp-logo {
            margin-bottom: 25px;
        }
        
        .otp-logo img {
            width: 70px;
            height: 70px;
        }
        
        .otp-logo h1 {
            color: var(--at-primary);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 10px 0 0 0;
        }
        
        .otp-icon {
            width: 60px;
            height: 60px;
            background: rgba(26, 71, 42, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .otp-icon i {
            font-size: 1.8rem;
            color: var(--at-primary);
        }
        
        .otp-card h2 {
            color: #333;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        
        .otp-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .otp-card .email {
            color: var(--at-primary);
            font-weight: 600;
        }
        
        .otp-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .otp-input {
            width: 50px;
            height: 55px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: var(--at-primary);
        }
        
        .btn-verify {
            width: 100%;
            padding: 14px;
            background: var(--at-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-verify:hover {
            background: var(--at-primary-dark);
        }
        
        .resend-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .resend-link a {
            color: var(--at-primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .resend-link a:hover {
            text-decoration: underline;
        }
        
        .timer {
            color: #999;
            font-size: 13px;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
    </style>
</head>
<body>
    <div class="otp-card">
        <div class="otp-logo">
            <img src="{% static 'logo.png' %}" alt="ANITECH Logo">
        </div>
        
        <div class="otp-icon">
            <i class="bi bi-shield-check"></i>
        </div>
        
        <h2>Verify Your Email</h2>
        <p>We've sent a 6-digit verification code to your email address. Please enter it below.</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post" id="otpForm">
            {% csrf_token %}
            <div class="otp-input-group">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
            </div>
            <input type="hidden" name="otp" id="otpValue">
            <button type="submit" class="btn-verify">
                <i class="bi bi-check-circle"></i> Verify
            </button>
        </form>

        <div class="resend-link">
            <span class="timer">Resend code in 60 seconds</span><br>
            <a href="#">Resend OTP</a>
        </div>
    </div>
    
    <script>
        // Auto-focus next input
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        // Combine inputs on form submit
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            let otp = '';
            inputs.forEach(input => otp += input.value);
            document.getElementById('otpValue').value = otp;
        });
    </script>
</body>
</html>
